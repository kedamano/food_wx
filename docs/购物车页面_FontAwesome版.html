<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - FontAwesome版</title>
    <!-- 引入Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS变量定义配色方案 */
        :root {
            --primary-green: #4CAF50;
            --light-green: #81C784;
            --dark-green: #388E3C;
            --white: #FFFFFF;
            --light-gray: #F8F9FA;
            --medium-gray: #E9ECEF;
            --dark-gray: #6C757D;
            --text-dark: #212529;
            --text-light: #6C757D;
            --border-color: #DEE2E6;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
            --danger: #FF5252;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--light-gray);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            position: relative;
        }

        /* 头部 */
        .header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .back-btn {
            font-size: 20px;
            color: var(--text-dark);
            text-decoration: none;
            margin-right: 15px;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--light-gray);
            color: var(--primary-green);
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            color: var(--text-dark);
        }

        .edit-btn {
            color: var(--primary-green);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid var(--primary-green);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: var(--primary-green);
            color: var(--white);
        }

        /* 商家信息 */
        .store-info {
            background: var(--white);
            padding: 18px 20px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .store-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
        }

        .store-name::before {
            content: '';
            margin-right: 8px;
            font-size: 18px;
        }

        .store-address {
            color: var(--text-light);
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .store-address::before {
            content: '';
            margin-right: 6px;
        }

        /* 购物车列表 */
        .cart-list {
            background: var(--white);
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .cart-item {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item:hover {
            background: var(--light-gray);
        }

        .item-checkbox {
            margin-right: 15px;
        }

        .item-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-green);
        }

        .item-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary-green), var(--light-green));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 24px;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .item-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="30" cy="30" r="2" fill="white" opacity="0.2"/></svg>') repeat;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .item-price {
            color: var(--primary-green);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .item-price::before {
            content: '';
            margin-right: 6px;
            font-size: 14px;
        }

        .item-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border: 2px solid var(--primary-green);
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--primary-green);
            transition: all 0.3s ease;
        }

        .quantity-btn:hover {
            background: var(--primary-green);
            color: var(--white);
            transform: scale(1.1);
        }

        .quantity-btn:disabled {
            border-color: var(--medium-gray);
            color: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .quantity-input {
            width: 50px;
            height: 32px;
            border: 2px solid var(--primary-green);
            text-align: center;
            margin: 0 10px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .delete-btn {
            color: var(--danger);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid var(--danger);
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .delete-btn i {
            margin-right: 4px;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: var(--white);
        }

        /* 优惠券 */
        .coupon-section {
            background: var(--white);
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .coupon-title {
            font-weight: bold;
            color: var(--text-dark);
        }

        .coupon-value {
            color: var(--primary-green);
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .coupon-value::before {
            content: '';
            margin-right: 6px;
        }

        .coupon-arrow {
            color: var(--text-light);
            font-size: 14px;
            margin-left: 8px;
        }

        /* 费用明细 */
        .cost-details {
            background: var(--white);
            padding: 20px;
            margin-bottom: 80px;
            box-shadow: var(--shadow);
        }

        .cost-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .cost-item.total {
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
            margin-top: 18px;
            font-weight: bold;
            font-size: 16px;
        }

        .cost-label {
            color: var(--text-light);
        }

        .cost-value {
            color: var(--text-dark);
            font-weight: 500;
        }

        .cost-value.discount {
            color: var(--primary-green);
        }

        .cost-value.total {
            color: var(--primary-green);
            font-size: 20px;
        }

        /* 底部结算栏 */
        .bottom-checkout {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 18px 20px;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
        }

        .select-all {
            display: flex;
            align-items: center;
            margin-right: 20px;
        }

        .select-all input {
            margin-right: 8px;
            accent-color: var(--primary-green);
        }

        .total-info {
            flex: 1;
            text-align: right;
            margin-right: 15px;
        }

        .total-label {
            font-size: 12px;
            color: var(--text-light);
        }

        .total-amount {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-green);
        }

        .checkout-btn {
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            color: var(--white);
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .checkout-btn:disabled {
            background: var(--medium-gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 响应式设计 */
        @media (max-width: 400px) {
            .container {
                max-width: 100%;
            }

            .bottom-checkout {
                max-width: 100%;
            }
        }

        /* 动画效果 */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cart-item {
            animation: slideInUp 0.6s ease-out;
        }

        .cart-item:nth-child(1) { animation-delay: 0.1s; }
        .cart-item:nth-child(2) { animation-delay: 0.2s; }
        .cart-item:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">购物车</div>
            <a href="#" class="edit-btn">编辑</a>
        </div>

        <!-- 商家信息 -->
        <div class="store-info">
            <div class="store-name"><i class="fas fa-store"></i> 川味轩</div>
            <div class="store-address"><i class="fas fa-map-marker-alt"></i> 距离您 1.2km | 预计送达 30分钟</div>
        </div>

        <!-- 购物车列表 -->
        <div class="cart-list">
            <div class="cart-item">
                <div class="item-checkbox">
                    <input type="checkbox" checked onchange="updateTotal()">
                </div>
                <div class="item-image"><i class="fas fa-drumstick-bite"></i></div>
                <div class="item-info">
                    <div class="item-name">红烧肉套餐</div>
                    <div class="item-price"><i class="fas fa-yen-sign"></i>28</div>
                    <div class="item-actions">
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(this, -1)"><i class="fas fa-minus"></i></button>
                            <input type="number" class="quantity-input" value="2" min="1" onchange="updateTotal()">
                            <button class="quantity-btn" onclick="changeQuantity(this, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <a href="#" class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash-alt"></i> 删除</a>
                    </div>
                </div>
            </div>

            <div class="cart-item">
                <div class="item-checkbox">
                    <input type="checkbox" checked onchange="updateTotal()">
                </div>
                <div class="item-image"><i class="fas fa-pepper-hot"></i></div>
                <div class="item-info">
                    <div class="item-name">麻辣香锅</div>
                    <div class="item-price"><i class="fas fa-yen-sign"></i>35</div>
                    <div class="item-actions">
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(this, -1)"><i class="fas fa-minus"></i></button>
                            <input type="number" class="quantity-input" value="1" min="1" onchange="updateTotal()">
                            <button class="quantity-btn" onclick="changeQuantity(this, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <a href="#" class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash-alt"></i> 删除</a>
                    </div>
                </div>
            </div>

            <div class="cart-item">
                <div class="item-checkbox">
                    <input type="checkbox" onchange="updateTotal()">
                </div>
                <div class="item-image"><i class="fas fa-bowl-food"></i></div>
                <div class="item-info">
                    <div class="item-name">小笼包</div>
                    <div class="item-price"><i class="fas fa-yen-sign"></i>18</div>
                    <div class="item-actions">
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(this, -1)"><i class="fas fa-minus"></i></button>
                            <input type="number" class="quantity-input" value="1" min="1" onchange="updateTotal()">
                            <button class="quantity-btn" onclick="changeQuantity(this, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <a href="#" class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash-alt"></i> 删除</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 优惠券 -->
        <div class="coupon-section">
            <div class="coupon-title">优惠券</div>
            <div style="display: flex; align-items: center;">
                <span class="coupon-value"><i class="fas fa-ticket-alt"></i> 满50减5元</span>
                <span class="coupon-arrow">></span>
            </div>
        </div>

        <!-- 费用明细 -->
        <div class="cost-details">
            <div class="cost-item">
                <span class="cost-label">商品小计</span>
                <span class="cost-value" id="subtotal">¥91</span>
            </div>
            <div class="cost-item">
                <span class="cost-label">配送费</span>
                <span class="cost-value">¥3</span>
            </div>
            <div class="cost-item">
                <span class="cost-label">优惠券</span>
                <span class="cost-value discount">-¥5</span>
            </div>
            <div class="cost-item total">
                <span class="cost-label">实付金额</span>
                <span class="cost-value total" id="total">¥89</span>
            </div>
        </div>

        <!-- 底部结算栏 -->
        <div class="bottom-checkout">
            <div class="select-all">
                <input type="checkbox" id="selectAll" checked onchange="toggleSelectAll()">
                <span>全选</span>
            </div>
            <div class="total-info">
                <div class="total-label">合计</div>
                <div class="total-amount" id="checkoutTotal">¥89</div>
            </div>
            <button class="checkout-btn" onclick="checkout()">
                去结算(3)
            </button>
        </div>
    </div>

    <script>
        function changeQuantity(btn, delta) {
            const input = btn.parentNode.querySelector('.quantity-input');
            let value = parseInt(input.value) + delta;
            if (value < 1) value = 1;
            input.value = value;
            updateTotal();

            // 按钮动画
            btn.style.transform = 'scale(0.8)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 150);
        }

        function updateTotal() {
            const items = document.querySelectorAll('.cart-item');
            let subtotal = 0;
            let selectedCount = 0;

            items.forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                if (checkbox.checked) {
                    const price = parseFloat(item.querySelector('.item-price').textContent.replace(/[^0-9]/g, ''));
                    const quantity = parseInt(item.querySelector('.quantity-input').value);
                    subtotal += price * quantity;
                    selectedCount++;
                }
            });

            const delivery = 3;
            const coupon = subtotal >= 50 ? 5 : 0;
            const total = subtotal + delivery - coupon;

            document.getElementById('subtotal').textContent = '¥' + subtotal;
            document.getElementById('total').textContent = '¥' + total;
            document.getElementById('checkoutTotal').textContent = '¥' + total;

            const checkoutBtn = document.querySelector('.checkout-btn');
            checkoutBtn.textContent = '去结算(' + selectedCount + ')';
            checkoutBtn.disabled = selectedCount === 0;
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.cart-item input[type="checkbox"]');

            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });

            updateTotal();
        }

        function deleteItem(link) {
            if (confirm('确定要删除这个商品吗？')) {
                const item = link.closest('.cart-item');

                // 删除动画
                item.style.transform = 'translateX(100%)';
                item.style.opacity = '0';

                setTimeout(() => {
                    item.remove();
                    updateTotal();
                }, 300);
            }
        }

        function checkout() {
            const total = document.getElementById('checkoutTotal').textContent;
            const btn = document.querySelector('.checkout-btn');

            // 按钮动画
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'translateY(-2px)';
            }, 150);

            alert('🛒 确认结算 ' + total + '？\n即将跳转到订单确认页面');
        }

        // 返回按钮动画
        document.querySelector('.back-btn').addEventListener('click', function() {
            this.style.transform = 'scale(0.8)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
                history.back();
            }, 150);
        });

        // 初始化计算
        updateTotal();
    </script>
</body>
</html>
